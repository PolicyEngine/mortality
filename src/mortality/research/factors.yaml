# Mortality factors from peer-reviewed research
# Each factor includes the source paper and effect sizes

health_status:
  source:
    title: "Living and dying in the USA: behavioral, health, and social differentials of adult mortality"
    authors: "Rogers, R. G., Hummer, R. A., & Nam, C. B."
    year: 2000
    journal: "Academic Press"
    doi: "10.1016/B978-012593130-8/50002-3"
  
  multipliers:
    excellent: 0.70  # 30% lower mortality
    good: 0.85      # 15% lower mortality
    average: 1.00   # Reference category
    poor: 1.30      # 30% higher mortality
  
  notes: "Self-reported health status is one of the strongest predictors of mortality"

smoking:
  source:
    title: "50-year trends in smoking-related mortality in the United States"
    authors: "Carter, B. D., et al."
    year: 2015
    journal: "New England Journal of Medicine"
    doi: "10.1056/NEJMsa1407211"
  
  multipliers:
    current_smoker: 1.80  # 80% higher mortality
    former_smoker: 1.20   # 20% higher (decreases over time)
    never_smoker: 1.00    # Reference
  
  notes: "Smoking approximately doubles mortality risk"

income:
  source:
    title: "The association between income and life expectancy in the United States, 2001-2014"
    authors: "Chetty, R., et al."
    year: 2016
    journal: "JAMA"
    doi: "10.1001/jama.2016.4226"
  
  # Income effects by percentile
  percentile_ranges:
    - range: [95, 100]
      multiplier: 0.70  # Top 5%
    - range: [90, 95]
      multiplier: 0.75  # Top 10%
    - range: [75, 90]
      multiplier: 0.85
    - range: [50, 75]
      multiplier: 0.95
    - range: [25, 50]
      multiplier: 1.05
    - range: [10, 25]
      multiplier: 1.20
    - range: [0, 10]
      multiplier: 1.35  # Bottom 10%
  
  notes: |
    Life expectancy gap between top 1% and bottom 1% is approximately 15 years for men
    and 10 years for women. Effect is roughly log-linear in income.

education:
  source:
    title: "Educational attainment and adult mortality in the United States"
    authors: "Hummer, R. A., & Hernandez, E. M."
    year: 2013
    journal: "Population Bulletin"
    url: "https://www.prb.org/resources/education-and-mortality/"
  
  multipliers:
    less_than_high_school: 1.25
    high_school: 1.15
    some_college: 1.05
    bachelors: 0.92
    graduate: 0.88
  
  notes: "Each education level associated with 2-3 year life expectancy gain"

exercise:
  source:
    title: "Leisure time physical activity of moderate to vigorous intensity and mortality"
    authors: "Moore, S. C., et al."
    year: 2012
    journal: "PLoS Medicine"
    doi: "10.1371/journal.pmed.1001335"
  
  multipliers:
    none: 1.20         # Sedentary
    light: 1.05        # <1 hour/week
    moderate: 0.95     # 1-3 hours/week  
    vigorous: 0.85     # >3 hours/week
  
  notes: "Regular exercise associated with 3-4 year life expectancy gain"

alcohol:
  source:
    title: "Alcohol dosing and total mortality in men and women"
    authors: "Di Castelnuovo, A., et al."
    year: 2006
    journal: "Archives of Internal Medicine"
    doi: "10.1001/archinte.166.22.2437"
  
  multipliers:
    none: 1.05         # Abstainers (may include former drinkers)
    light: 0.95        # <1 drink/day
    moderate: 0.95     # 1-2 drinks/day (J-curve minimum)
    heavy: 1.30        # >3 drinks/day
  
  notes: "J-shaped relationship; moderate drinking associated with lowest mortality"

bmi:
  source:
    title: "Association of all-cause mortality with overweight and obesity"
    authors: "Flegal, K. M., et al."
    year: 2013
    journal: "JAMA"
    doi: "10.1001/jama.2012.113905"
  
  ranges:
    - range: [0, 18.5]
      label: "underweight"
      multiplier: 1.20
    - range: [18.5, 25.0]
      label: "normal"
      multiplier: 1.00
    - range: [25.0, 30.0]
      label: "overweight"
      multiplier: 0.98  # Slight protective effect
    - range: [30.0, 35.0]
      label: "obese_class_1"
      multiplier: 1.20
    - range: [35.0, 40.0]
      label: "obese_class_2"
      multiplier: 1.40
    - range: [40.0, 100.0]
      label: "obese_class_3"
      multiplier: 1.60
  
  notes: "Overweight paradox: slight protective effect for BMI 25-30"

# Interaction effects (multiplicative)
interactions:
  smoking_and_exercise:
    description: "Exercise partially mitigates smoking risk"
    effect: 0.90  # Reduce combined effect by 10%
  
  income_and_education:
    description: "Income and education effects overlap"
    effect: 0.95  # Reduce combined effect by 5%

# Meta-analysis summary
meta_analysis:
  source:
    title: "Determinants of mortality: A systematic review and meta-analysis"
    authors: "Stringhini, S., et al."
    year: 2017
    journal: "The Lancet"
    doi: "10.1016/S0140-6736(16)32380-7"
  
  summary: |
    Socioeconomic factors account for similar mortality risk as major
    clinical risk factors. Low socioeconomic status comparable to
    physical inactivity, diabetes, and hypertension in terms of
    years of life lost.